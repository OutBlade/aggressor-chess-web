<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Aggressor Chess AI | Outblade</title>

  <!-- Basic SEO -->
  <meta name="description" content="Play against the Aggressor Chess AI by Outblade. A powerful web chess game with a custom Stockfish engine optimised for aggressive attacks and sacrifices. Free, playable offline, directly in your browser or as an app." />
  <meta name="keywords" content="Aggressor Chess AI Outblade, Aggressor Chess, Outblade Chess AI, Aggressive Stockfish Web App, Sacrifice Chess AI, play chess free, Browser Chess Engine, Patricia Chess Engine, Adam Kulju, extreme aggression chess engine, EAS tool Stefan Pohl, tactical chess AI, sacrifice-heavy chess, Willow neural network, superhuman strength chess, LC0 alternative, open-source aggressive chess engine" />
  <meta name="author" content="Outblade" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://OutBlade.github.io/aggressor-chess-web/" />

  <!-- Theme & PWA -->
  <meta name="theme-color" content="#0b0d17" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AGGRESSOR" />

  <!-- Open Graph -->
  <meta property="og:title" content="Aggressor Chess AI | Outblade" />
  <meta property="og:description" content="Play against the aggressive Outblade Chess AI. Free and extremely strong!" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://OutBlade.github.io/aggressor-chess-web/" />

  <!-- Structured Data (Schema.org) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Aggressor Chess AI Outblade",
    "url": "https://OutBlade.github.io/aggressor-chess-web/",
    "description": "A modern chess game with an aggressively modified Stockfish AI (Outblade), running in the browser and installable as a PWA.",
    "applicationCategory": "GameApplication",
    "operatingSystem": "All",
    "author": {
      "@type": "Organization",
      "name": "Outblade"
    }
  }
  </script>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-512.png" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- Top Bar -->
    <header id="topbar">
      <div id="logo">♟ AGGRESSOR</div>
      <div id="mode-toggle">
        <button class="mode-btn active" data-mode="vs_ai" id="btn-vs-ai">vs. AI</button>
        <button class="mode-btn" data-mode="vs_human" id="btn-vs-human">vs. Human</button>
        <button class="mode-btn" data-mode="openings" id="btn-openings">Openings</button>
      </div>
      <div id="engine-badge">
        <span class="badge-dot"></span>
        <span id="engine-label">Engine lädt…</span>
      </div>
    </header>

    <!-- Main Layout -->
    <main id="layout">

      <!-- Board Column -->
      <section id="board-col">
        <div id="board-wrap">
          <div id="rank-labels-left"></div>
          <div id="board-grid"></div>
          <div id="rank-labels-right"></div>
        </div>
        <div id="file-labels"></div>
      </section>

      <!-- Panel Column -->
      <aside id="panel">

        <!-- Turn / Status -->
        <div id="status-box">
          <div id="turn-indicator">Waiting for engine…</div>
          <div id="eval-bar-wrap">
            <div id="eval-bar-fill"></div>
            <span id="eval-label"></span>
          </div>
        </div>

        <!-- Difficulty -->
        <div class="panel-section">
          <div class="section-label">Difficulty</div>
          <div id="diff-buttons"></div>
        </div>

        <!-- Playstyle -->
        <div class="panel-section">
          <div class="section-label">Play Style</div>
          <div id="style-buttons"></div>
        </div>

        <!-- Aggression Threshold -->
        <div class="panel-section">
          <div class="section-label">Aggression Threshold: <span id="threshold-val">45</span> cp</div>
          <input type="range" id="threshold-slider" min="0" max="150" value="45" step="5" />
          <div class="hint">0 = pure Stockfish &nbsp;|&nbsp; 150 = maximum aggression</div>
        </div>

        <!-- Move History -->
        <div class="panel-section" style="flex:1; min-height:0;">
          <div class="section-label">Move History</div>
          <div id="move-list"></div>
        </div>

        <!-- Captured pieces -->
        <div class="panel-section">
          <div id="captured-w"><span class="cap-label">White lost:</span></div>
          <div id="captured-b"><span class="cap-label">Black lost:</span></div>
        </div>

        <!-- Action Buttons -->
        <div id="action-buttons">
          <button id="btn-new"  class="action-btn green">New Game</button>
          <button id="btn-undo" class="action-btn blue">⬅ Undo</button>
          <button id="btn-flip" class="action-btn purple">⇅ Flip</button>
        </div>

        <!-- Install PWA -->
        <div id="install-wrap" style="display:none;">
          <button id="btn-install" class="action-btn gold">📲 Install App</button>
        </div>

      </aside>
    </main>

    <!-- Overlays -->
    <div id="promotion-overlay" class="overlay hidden">
      <div class="overlay-box">
        <div class="overlay-title">Pawn Promotion</div>
        <div id="promo-choices"></div>
      </div>
    </div>

    <div id="gameover-overlay" class="overlay hidden">
      <div class="overlay-box">
        <div class="overlay-title" id="gameover-title">Game Over</div>
        <div id="gameover-msg"></div>
        <button id="btn-gameover-new" class="action-btn green" style="margin-top:20px;">New Game</button>
      </div>
    </div>

  </div><!-- #app -->

  <!-- Openings Panel -->
  <aside id="openings-panel" style="display:none;">
    <div class="panel-section">
      <div class="section-label">Opening Explorer</div>
      <div id="opening-filter">
        <button class="diff-btn active" data-filter="all">All</button>
        <button class="diff-btn" data-filter="aggressive">Aggressive</button>
        <button class="diff-btn" data-filter="passive">Passive</button>
      </div>
    </div>

    <div id="opening-list-view">
      <div id="opening-list"></div>
    </div>

    <div id="opening-detail-view" style="display:none;">
      <div id="opening-detail-header">
        <span id="opening-detail-name"></span>
        <span id="opening-detail-eco"></span>
        <span id="opening-detail-badge"></span>
      </div>
      <div id="opening-detail-desc"></div>
      <div id="opening-moves-strip"></div>
      <div id="opening-nav-row">
        <button id="btn-opening-prev" class="action-btn blue">&#9664;</button>
        <span id="opening-step-info">0 / 0</span>
        <button id="btn-opening-next" class="action-btn blue">&#9654;</button>
      </div>
      <button id="btn-play-from-here" class="action-btn green">Play from here vs AI</button>
      <button id="btn-back-to-list" class="action-btn purple">&#8592; Back</button>
    </div>
  </aside>

  <script src="lib/chess.min.js"></script>
  <script src="openings.js"></script>
  <script src="app.js"></script>
</body>
</html>
